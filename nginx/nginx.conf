events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    # ── Cloudflare real IP ──
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    real_ip_header CF-Connecting-IP;

    # ── User frontend ──
    server {
        listen 80;
        server_name face.face-recognition-system-36.me localhost;

        resolver 127.0.0.11 valid=10s ipv6=off;

        location /api/ {
            set                $backend_host "backend:8000";
            proxy_pass         http://$backend_host;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
            proxy_read_timeout 60s;
        }

        location /ws/ {
            set                $backend_host "backend:8000";
            proxy_pass         http://$backend_host;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_read_timeout 3600s;
        }

        location / {
            set                $frontend_host "frontend-user:80";
            proxy_pass         http://$frontend_host;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
        }
    }

    # ── Admin frontend ──
    server {
        listen 80;
        server_name admin.face-recognition-system-36.me;

        resolver 127.0.0.11 valid=10s ipv6=off;

        location /api/ {
            set                $backend_host "backend:8000";
            proxy_pass         http://$backend_host;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }

        location / {
            set                $admin_host "frontend-admin:80";
            proxy_pass         http://$admin_host;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
        }
    }
}